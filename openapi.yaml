openapi: 3.0.0
info:
  title: LMS Auth Backend API
  description: Learning Management System Authentication and User Management API
  version: 1.0.0
  contact:
    name: Backend Team

servers:
  - url: http://localhost:5001
    description: Development server
  - url: https://api.lms.example.com
    description: Production server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint

  schemas:
    Error:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "Email is required"
            details:
              type: object
              nullable: true

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
        role:
          type: string
          enum: [READER, ADMIN, ROOT_ADMIN]
        createdAt:
          type: string
          format: date-time

    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ISBN:
          type: string
        title:
          type: string
        author:
          type: string
        categories:
          type: array
          items:
            type: string
        thumbnail_url:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    Favorite:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        bookId:
          type: string
          format: uuid
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

paths:
  /health:
    get:
      tags:
        - Health
      summary: API Health Check
      description: Returns the current health status of the API
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: "ok"

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User Login
      description: Authenticate user with email and password, receive JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  minLength: 8
                  example: "SecurePass123"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          email:
                            type: string
                      tokens:
                        type: object
                        properties:
                          accessToken:
                            type: string
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh Access Token
      description: Obtain a new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User Logout
      description: Clear authentication cookies and logout user
      responses:
        "200":
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object

  /admin/manage/reader:
    get:
      tags:
        - Admin Users
      summary: List All Users
      description: Get all users in the system (admin only)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  results:
                    type: number
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - Admin Users
      summary: Create New User
      description: Create a new user account (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - email
                - password
              properties:
                firstName:
                  type: string
                  minLength: 2
                lastName:
                  type: string
                  minLength: 2
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [READER, ADMIN, ROOT_ADMIN]
                  default: READER
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Validation error or duplicate email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/manage/reader/{id}:
    delete:
      tags:
        - Admin Users
      summary: Delete User
      description: Delete a user account (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User deleted successfully
        "400":
          description: Cannot delete self
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Cannot delete ROOT_ADMIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Admin Users
      summary: Update User Role
      description: Update user's role (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [READER, ADMIN, ROOT_ADMIN]
      responses:
        "200":
          description: User updated successfully
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/manage/reader/reset-password/{id}:
    put:
      tags:
        - Admin Users
      summary: Reset User Password
      description: Force reset a user's password (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
              properties:
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password reset successfully
        "400":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Cannot reset ROOT_ADMIN password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/manage/reader/delete-many:
    delete:
      tags:
        - Admin Users
      summary: Delete Multiple Users
      description: Delete multiple users at once (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emails
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
                  minItems: 1
      responses:
        "200":
          description: Users deleted successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reader/favorites:
    get:
      tags:
        - Favorites
      summary: List User's Favorites
      description: Get all favorites for the authenticated user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of favorite items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Favorite"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - Favorites
      summary: Add Book to Favorites
      description: Add a book to user's favorites
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bookId
              properties:
                bookId:
                  type: string
                  format: uuid
                notes:
                  type: string
      responses:
        "201":
          description: Added to favorites
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      favoriteItem:
                        $ref: "#/components/schemas/Favorite"
        "400":
          description: Book already in favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reader/favorites/{id}:
    get:
      tags:
        - Favorites
      summary: Get Favorite Details
      description: Get details of a specific favorite
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Favorite details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Favorite"
        "404":
          description: Favorite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Favorites
      summary: Update Favorite
      description: Update notes on a favorite item
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Favorite updated
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Favorite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Favorites
      summary: Remove from Favorites
      description: Delete a favorite item
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Removed from favorites
        "404":
          description: Favorite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reader/favorites/delete-many:
    delete:
      tags:
        - Favorites
      summary: Remove Multiple Favorites
      description: Delete multiple favorites at once
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        "200":
          description: Favorites removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  requestedCount:
                    type: number
                  deletedCount:
                    type: number
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

tags:
  - name: Health
    description: API health and status
  - name: Authentication
    description: User authentication and token management
  - name: Admin Users
    description: User management endpoints (admin only)
  - name: Favorites
    description: User favorites management
